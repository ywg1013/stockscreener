# 定时运行 2 个 Python 脚本（北京时间每天 17:00）
name: Run Python Scripts Daily

# 触发条件：定时 + 手动可运行
on:
  schedule:
    # 重点：UTC 9:00 = 北京时间 17:00（中国时区+8）
    - cron: "0 9 * * *"
  # 允许你在 GitHub 页面手动点一下运行（测试用）
  workflow_dispatch:

# 运行任务
jobs:
  run-scripts:
    # 使用最新 Ubuntu 服务器
    runs-on: ubuntu-latest
    # 执行步骤
    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.1"

      # 3. 安装依赖（如果有 requirements.txt 才需要这步）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 依次运行 2 个脚本
      - name: Run stock_filter
        env:
          QQ_AUTH_CODE: ${{ secrets.QQ_MAIL_CODE }}
        run: python stock_filter.py

      - name: Run send_email
        env:
          QQ_AUTH_CODE: ${{ secrets.QQ_MAIL_CODE }}
        run: python send_email.py

